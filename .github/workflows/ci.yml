name: Iteratr CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Next.js Web App ────────────────────────────────────
  nextjs-build:
    name: "Next.js — Lint & Build"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: TypeScript type-check
      run: npx tsc --noEmit

    - name: Build Next.js application
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
        # ── Auth (placeholders — real values set in Vercel/server env) ──
        NEXTAUTH_SECRET: ci-placeholder-secret-min-32-chars-long
        NEXTAUTH_URL: http://localhost:3000
        GOOGLE_CLIENT_ID: ci-placeholder
        GOOGLE_CLIENT_SECRET: ci-placeholder
        GITHUB_CLIENT_ID: ci-placeholder
        GITHUB_CLIENT_SECRET: ci-placeholder
        # ── Supabase (placeholders) ──
        NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
        SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
        # ── Stripe (test mode placeholders) ──
        STRIPE_SECRET_KEY: sk_test_placeholder
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        # ── AI & Services (placeholders) ──
        GEMINI_API_KEY: ci-placeholder-gemini-key
        JUDGE0_API_URL: https://ce.judge0.com
        UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
        UPSTASH_REDIS_REST_TOKEN: ci-placeholder-upstash-token
        RAG_ADMIN_KEY: ci-placeholder-rag-key
        # ── WebSocket server ──
        NEXT_PUBLIC_WS_URL: http://localhost:3001

  # ── Job 2: WebSocket Server (Node.js standalone) ─────────────
  ws-server-check:
    name: "WS Server — Syntax Check"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Syntax check WebSocket server
      run: node --check server/index.js
