name: Iteratr CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npx eslint .

    - name: Build Next.js application
      run: npm run build
      env:
        # Prevent telemetry during CI
        NEXT_TELEMETRY_DISABLED: 1
        # Placeholders for build-time static checks
        NEXTAUTH_SECRET: static-placeholder-for-ci
        GOOGLE_CLIENT_ID: static-placeholder-for-ci
        GOOGLE_CLIENT_SECRET: static-placeholder-for-ci
        GITHUB_CLIENT_ID: static-placeholder-for-ci
        GITHUB_CLIENT_SECRET: static-placeholder-for-ci
        NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: static-placeholder-for-ci
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
